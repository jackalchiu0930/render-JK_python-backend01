services:
  - type: web
    name: jackal-aiot-pwa
    runtime: python
    version: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PORT
        generateValue: true # Render自动分配端口
      - key: VITE_BACKEND_URL
        value: https://jackalaiot.onrender.com # 替换为你的Render项目域名
      - key: DEFAULT_IMAGE_PATH
        value: Icon_Jackal.png # 与本地图片路径一致
      # 可选：配置VAPID密鑰，避免硬編碼
      # - key: VAPID_PUBLIC_KEY
      #   value: 你的公鑰
      # - key: VAPID_PRIVATE_KEY
      #   value: 你的私鑰